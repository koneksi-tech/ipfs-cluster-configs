#   map $http_upgrade $connection_upgrade { default upgrade; '' close; }
# then here: proxy_set_header Upgrade $http_upgrade;
#             proxy_set_header Connection $connection_upgrade;
# (and remove proxy_set_header Connection "" above for that location)
