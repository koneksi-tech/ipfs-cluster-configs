# HashiCorp Vault — optional reverse proxy for hash-vault.koneksi.co.kr (e.g. node-5).
# Vault cluster nodes are NOT nginx; they expose Vault on public IP:8200. This file is only
# for clients that use the hostname; direct IP:8200 access bypasses this LB.
# Include inside nginx http { } (same pattern as other site configs).
#
# Backends: Vault listens on :8200 with TLS DISABLED (plain HTTP) — curl https://IP:8200
# gives "wrong version number". LB terminates TLS for clients; proxy_pass is http:// upstream.
# If you later enable TLS on Vault :8200, switch proxy_pass to https:// and add proxy_ssl_* back.

upstream hashicorp_vault {
    least_conn;
    server 129.212.216.181:8200 max_fails=3 fail_timeout=30s;
    server 129.212.210.167:8200 max_fails=3 fail_timeout=30s;
    server 167.172.6.235:8200 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name hash-vault.koneksi.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hash-vault.koneksi.co.kr;

    # Same cert/key as ipfs-lb.conf (ensure SAN or wildcard covers hash-vault.koneksi.co.kr)
    ssl_certificate     /etc/ssl/certs/koneksi.co.kr/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/koneksi.co.kr/koneksi.co.kr.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Snapshots / large CLI payloads
    client_max_body_size 0;

    proxy_connect_timeout 75s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    location / {
        proxy_pass http://hashicorp_vault;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }
}

