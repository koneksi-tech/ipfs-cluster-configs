# Server 2 – same upstreams as Server 1 (ipfs/node-1/nignx/ipfs-performance.conf)
# Include from http { } or from a file included there (e.g. conf.d/).

# Upstreams (local IPFS and cluster on Server 2)
upstream ipfs_gateway {
    server 127.0.0.1:8080;
    keepalive 96;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream ipfs_api {
    server 127.0.0.1:5001;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream ipfs_cluster {
    server 127.0.0.1:9094;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

proxy_http_version 1.1;
proxy_set_header Connection "";

client_max_body_size 20G;
client_body_buffer_size 512M;
client_body_temp_path /var/cache/nginx/client_temp 1 2;

proxy_request_buffering off;
proxy_buffering off;

proxy_connect_timeout 600s;
proxy_send_timeout 86400s;
proxy_read_timeout 86400s;
send_timeout 86400s;

proxy_buffer_size 1M;
proxy_buffers 16 1M;
proxy_busy_buffers_size 2M;
proxy_temp_file_write_size 2M;

client_header_buffer_size 128k;
large_client_header_buffers 8 128k;

keepalive_timeout 60s;
keepalive_requests 1000;

limit_req_status 429;
